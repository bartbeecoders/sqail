name: Build & Deploy Release

# Trigger on version tags (v0.3.0, v0.4.0, etc.) or manual dispatch
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_portal:
        description: "Also rebuild and deploy the portal"
        type: boolean
        default: true

env:
  REGISTRY: beecodersregistry.azurecr.io
  IMAGE_NAME: sqail-portal

jobs:
  # ── Prepare: extract version + build number ────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      file_prefix: ${{ steps.meta.outputs.file_prefix }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version and build number
        id: meta
        run: |
          APP_VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' package.json | head -1 | sed 's/.*"\([^"]*\)"$/\1/')
          BUILD_NUMBER=$(date -u +"%Y%m%d")-${{ github.run_number }}
          FILE_PREFIX="sqail_${APP_VERSION}_${BUILD_NUMBER}"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "file_prefix=$FILE_PREFIX" >> "$GITHUB_OUTPUT"
          echo "Version: $APP_VERSION, Build: $BUILD_NUMBER"

  # ── Build for each platform ────────────────────────────────────────────
  build-linux:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libkrb5-dev \
            fakeroot \
            zstd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Write build number
        run: |
          cat > build-number.json <<'EOF'
          {
            "date": "${{ needs.prepare.outputs.build_number }}",
            "revision": ${{ github.run_number }},
            "buildNumber": "${{ needs.prepare.outputs.build_number }}"
          }
          EOF

      - name: Build frontend
        run: pnpm build

      - name: Build deb
        run: pnpm tauri build --bundles deb --config src-tauri/tauri.ci.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build AppImage
        run: pnpm tauri build --bundles appimage --config src-tauri/tauri.ci.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build rpm
        run: pnpm tauri build --bundles rpm --config src-tauri/tauri.ci.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Arch package (pacman)
        run: |
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          VERSION="${{ needs.prepare.outputs.app_version }}"
          BUNDLE="src-tauri/target/release/bundle"

          # Create a PKGBUILD-style directory structure
          PKG_ROOT="archpkg/sqail"
          mkdir -p "$PKG_ROOT/usr/bin"
          mkdir -p "$PKG_ROOT/usr/share/applications"
          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/128x128/apps"
          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/32x32/apps"

          # Copy the binary from the deb bundle (same binary)
          cp src-tauri/target/release/sqail "$PKG_ROOT/usr/bin/sqail"
          chmod 755 "$PKG_ROOT/usr/bin/sqail"

          # Desktop file
          cat > "$PKG_ROOT/usr/share/applications/sqail.desktop" <<DESK
          [Desktop Entry]
          Name=sqail
          Comment=A lightweight SQL database editor with AI integration
          Exec=sqail
          Icon=sqail
          Terminal=false
          Type=Application
          Categories=Development;Database;
          DESK
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' "$PKG_ROOT/usr/share/applications/sqail.desktop"

          # Icons
          cp src-tauri/icons/128x128.png "$PKG_ROOT/usr/share/icons/hicolor/128x128/apps/sqail.png"
          cp src-tauri/icons/32x32.png "$PKG_ROOT/usr/share/icons/hicolor/32x32/apps/sqail.png"

          # .PKGINFO
          INSTALLED_SIZE=$(du -sb "$PKG_ROOT" | cut -f1)
          cat > archpkg/.PKGINFO <<PKGINFO
          pkgname = sqail
          pkgver = ${VERSION}-1
          pkgdesc = A lightweight SQL database editor with AI integration
          url = https://sqail.io
          builddate = $(date +%s)
          packager = sqail CI <ci@sqail.io>
          size = ${INSTALLED_SIZE}
          arch = x86_64
          license = MIT
          depend = webkit2gtk-4.1
          depend = gtk3
          depend = openssl
          PKGINFO
          sed -i 's/^          //' archpkg/.PKGINFO

          # Build the .pkg.tar.zst
          mkdir -p dist/releases
          cd archpkg
          fakeroot -- bash -c '
            tar -cf - --zstd \
              -C . .PKGINFO \
              -C sqail usr \
            > ../dist/releases/'"${PREFIX}"'_x86_64.pkg.tar.zst
          '
          cd ..

      - name: Collect artifacts
        run: |
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p dist/releases

          # deb
          for f in "$BUNDLE/deb/"*.deb; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_amd64.deb"
          done
          # AppImage
          for f in "$BUNDLE/appimage/"*.AppImage; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_amd64.AppImage"
          done
          # AppImage signature (for updater)
          for f in "$BUNDLE/appimage/"*.AppImage.sig; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_amd64.AppImage.sig"
          done
          # rpm
          for f in "$BUNDLE/rpm/"*.rpm; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_amd64.rpm"
          done
          # Arch .pkg.tar.zst is already in dist/releases/ from the build step

          ls -lh dist/releases/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/releases/sqail_*
          retention-days: 30

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Write build number
        shell: bash
        run: |
          cat > build-number.json <<'EOF'
          {
            "date": "${{ needs.prepare.outputs.build_number }}",
            "revision": ${{ github.run_number }},
            "buildNumber": "${{ needs.prepare.outputs.build_number }}"
          }
          EOF

      - name: Build frontend
        run: pnpm build

      - name: Build NSIS + MSI
        run: pnpm tauri build --config src-tauri/tauri.ci.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        shell: bash
        run: |
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p dist/releases

          # NSIS
          for f in "$BUNDLE/nsis/"*.exe; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_x64-setup.exe"
          done
          # NSIS signature (for updater)
          for f in "$BUNDLE/nsis/"*.nsis.zip.sig; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_x64-setup.nsis.zip.sig"
          done
          # MSI
          for f in "$BUNDLE/msi/"*.msi; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_x64-setup.msi"
          done

          ls -lh dist/releases/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/releases/sqail_*
          retention-days: 30

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (with both macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos-universal

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Write build number
        run: |
          cat > build-number.json <<'EOF'
          {
            "date": "${{ needs.prepare.outputs.build_number }}",
            "revision": ${{ github.run_number }},
            "buildNumber": "${{ needs.prepare.outputs.build_number }}"
          }
          EOF

      - name: Build frontend
        run: pnpm build

      - name: Build universal DMG (x86_64 + aarch64)
        run: pnpm tauri build --target universal-apple-darwin --config src-tauri/tauri.ci.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Ad-hoc sign the .app bundle
        # Even without an Apple Developer ID, re-signing with `-` ad-hoc
        # ensures every binary inside the bundle has a valid signature.
        # This prevents "damaged" errors that come from a broken/missing
        # signature on arm64 after lipo. Gatekeeper will still block on
        # quarantine (users must run `xattr -cr`) — that's a separate
        # issue solved only by real notarization.
        run: |
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          for app in "$BUNDLE/macos/"*.app; do
            [ -d "$app" ] || continue
            echo "Ad-hoc signing $app"
            codesign --force --deep --sign - "$app"
            codesign --verify --deep --strict --verbose=2 "$app" || true
          done

      - name: Collect artifacts
        run: |
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p dist/releases

          # DMG (universal)
          for f in "$BUNDLE/dmg/"*.dmg; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_universal.dmg"
          done
          # App bundle as tar.gz (universal)
          for f in "$BUNDLE/macos/"*.app; do
            [ -d "$f" ] && tar -czf "dist/releases/${PREFIX}_universal.app.tar.gz" -C "$BUNDLE/macos" "$(basename "$f")"
          done
          # macOS tar.gz signature (for updater)
          for f in "$BUNDLE/macos/"*.tar.gz.sig; do
            [ -f "$f" ] && cp "$f" "dist/releases/${PREFIX}_universal.app.tar.gz.sig"
          done

          ls -lh dist/releases/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: dist/releases/sqail_*
          retention-days: 30

  # ── Build DbService (Windows self-contained) ──────────────────────────
  build-dbservice-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish Sqail.DbService (win-x64, self-contained)
        shell: bash
        run: |
          dotnet publish sqail-dbservice/Sqail.DbService/Sqail.DbService.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o sqail-dbservice/publish/win-x64

      - name: Package zip
        shell: bash
        run: |
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          mkdir -p dist/releases
          cd sqail-dbservice/publish/win-x64
          7z a -tzip "../../../dist/releases/${PREFIX}_dbservice_win-x64.zip" .
          cd -
          ls -lh dist/releases/

      - uses: actions/upload-artifact@v4
        with:
          name: dbservice-windows
          path: dist/releases/sqail_*_dbservice_*
          retention-days: 30

  # ── Create GitHub release with updater manifest ────────────────────────
  github-release:
    needs: [prepare, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify updater signatures are present
        run: |
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          missing=0
          for f in \
            "artifacts/${PREFIX}_amd64.AppImage.sig" \
            "artifacts/${PREFIX}_x64-setup.nsis.zip.sig" \
            "artifacts/${PREFIX}_universal.app.tar.gz.sig"; do
            if [ ! -s "$f" ]; then
              echo "::error::Missing updater signature: $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::Updater signing is not configured. Set TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets, or the release will ship a manifest with empty signatures that the client cannot parse (issue #34)."
            exit 1
          fi

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${{ needs.prepare.outputs.app_version }}"
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO="bartbeecoders/sqail"
          TAG="v${VERSION}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Signatures are verified present by the preceding step —
          # reading them here is now infallible.
          LINUX_SIG=$(cat "artifacts/${PREFIX}_amd64.AppImage.sig")
          WINDOWS_SIG=$(cat "artifacts/${PREFIX}_x64-setup.nsis.zip.sig")
          MACOS_SIG=$(cat "artifacts/${PREFIX}_universal.app.tar.gz.sig")

          # Extract release notes from releases.json
          NOTES=$(python3 -c "
          import json
          with open('releases.json') as f:
              releases = json.load(f)
          r = next((r for r in releases if r['version'] == '${VERSION}'), None)
          if r:
              lines = []
              for s in r['sections']:
                  lines.append('### ' + s['title'])
                  for item in s['items']:
                      lines.append('- ' + item)
                  lines.append('')
              print('\n'.join(lines))
          else:
              print('Release ${VERSION}')
          ")

          cat > latest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": $(echo "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))"),
            "pub_date": "${DATE}",
            "platforms": {
              "linux-x86_64": {
                "url": "${BASE_URL}/${PREFIX}_amd64.AppImage",
                "signature": "${LINUX_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/${PREFIX}_x64-setup.exe",
                "signature": "${WINDOWS_SIG}"
              },
              "darwin-aarch64": {
                "url": "${BASE_URL}/${PREFIX}_universal.app.tar.gz",
                "signature": "${MACOS_SIG}"
              },
              "darwin-x86_64": {
                "url": "${BASE_URL}/${PREFIX}_universal.app.tar.gz",
                "signature": "${MACOS_SIG}"
              }
            }
          }
          MANIFEST
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' latest.json
          echo "Generated latest.json:"
          cat latest.json

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.app_version }}"
          TAG="v${VERSION}"
          PREFIX="${{ needs.prepare.outputs.file_prefix }}"

          # Collect all uploadable files
          FILES=(latest.json)
          for f in artifacts/${PREFIX}_*; do
            [ -f "$f" ] && FILES+=("$f")
          done

          # Create or update the release
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            # Extract notes for release body
            NOTES=$(python3 -c "
          import json
          with open('releases.json') as f:
              releases = json.load(f)
          r = next((r for r in releases if r['version'] == '${VERSION}'), None)
          if r:
              lines = []
              for s in r['sections']:
                  lines.append('### ' + s['title'])
                  for item in s['items']:
                      lines.append('- ' + item)
                  lines.append('')
              print('\n'.join(lines))
          else:
              print('Release ${VERSION}')
          ")
            gh release create "$TAG" "${FILES[@]}" --title "$TAG" --notes "$NOTES"
          fi

  # ── Upload binaries to VPS ─────────────────────────────────────────────
  deploy-binaries:
    needs: [prepare, build-linux, build-windows, build-macos, build-dbservice-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "artifacts/*"
          target: /opt/sqail-releases
          strip_components: 1

      - name: Generate manifest on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/sqail-releases
            FILES=$(ls -1 sqail_* 2>/dev/null | jq -R -s 'split("\n") | map(select(length > 0))')
            cat > manifest.json <<EOF
            {
              "version": "${{ needs.prepare.outputs.app_version }}",
              "buildNumber": "${{ needs.prepare.outputs.build_number }}",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "files": $FILES
            }
            EOF
            echo "Manifest:"
            cat manifest.json

  # ── Rebuild & deploy portal with updated download links ────────────────
  deploy-portal:
    needs: [prepare, deploy-binaries]
    if: ${{ github.event_name == 'push' || inputs.deploy_portal }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update portal constants and copy releases.json
        run: |
          VERSION="${{ needs.prepare.outputs.app_version }}"
          BUILD="${{ needs.prepare.outputs.build_number }}"
          sed -i "s/export const VERSION = \".*\"/export const VERSION = \"$VERSION\"/" sqail.portal/src/lib/constants.ts
          sed -i "s/export const BUILD_NUMBER = \".*\"/export const BUILD_NUMBER = \"$BUILD\"/" sqail.portal/src/lib/constants.ts
          cp releases.json sqail.portal/releases.json
          echo "Updated constants.ts:"
          head -2 sqail.portal/src/lib/constants.ts

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push portal image
        uses: docker/build-push-action@v5
        with:
          context: ./sqail.portal
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.app_version }}

      - name: Deploy to K3S
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if command -v kubectl >/dev/null 2>&1; then
              KUBECTL="kubectl"
            else
              KUBECTL="sudo k3s kubectl"
            fi
            $KUBECTL -n sqail rollout restart deployment sqail-portal
            $KUBECTL -n sqail rollout status deployment sqail-portal --timeout=120s
