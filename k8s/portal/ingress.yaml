apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sqail-portal
  namespace: sqail
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - sqail.ai
      secretName: sqail-ai-tls
  rules:
    - host: sqail.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sqail-portal
                port:
                  number: 80
